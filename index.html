<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar Todo</title>

<style>

body{
font-family:Arial;
margin:0;
padding:10px;
background:#f5f5f5;
}

.container{
display:flex;
flex-direction:column;
gap:15px;
}

@media(min-width:800px){
.container{
flex-direction:row;
}
}

.calendar{
flex:3;
background:white;
padding:10px;
border-radius:10px;
}

.todo{
flex:1;
background:white;
padding:10px;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.day{
background:#fafafa;
border-radius:6px;
min-height:90px;
padding:4px;
display:flex;
flex-direction:column;
}

.date{
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.tasks{
flex:1;
cursor:pointer;
}

.task{
padding:2px 6px;
margin:2px 0;
border-radius:4px;
font-size:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.task button{
border:none;
background:none;
cursor:pointer;
font-size:12px;
}

.todo-list{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.todo-item{
padding:4px 8px;
border-radius:4px;
cursor:pointer;
font-size:13px;
}

.colors{
display:flex;
gap:5px;
margin-top:10px;
}

.color{
width:24px;
height:24px;
border-radius:4px;
cursor:pointer;
border:2px solid transparent;
}

.color.active{
border:2px solid black;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

</style>
</head>

<body>

<div class="container">

<div class="calendar">

<h3 id="month"></h3>

<div class="grid" id="calendar"></div>

</div>


<div class="todo">

<h3>待办箱</h3>

<input id="todoInput" placeholder="输入任务">
<button onclick="addTodo()">添加</button>

<div class="todo-list" id="todoList"></div>

<div class="colors">
<div class="color active" style="background:#ff6b6b" onclick="selectColor('#ff6b6b',this)"></div>
<div class="color" style="background:#4dabf7" onclick="selectColor('#4dabf7',this)"></div>
<div class="color" style="background:#51cf66" onclick="selectColor('#51cf66',this)"></div>
<div class="color" style="background:#ffd43b" onclick="selectColor('#ffd43b',this)"></div>
<div class="color" style="background:#b197fc" onclick="selectColor('#b197fc',this)"></div>
</div>

</div>

</div>


<div class="modal" id="dayModal">
<div class="modal-content">

<h3 id="modalDate"></h3>

<div id="modalTasks"></div>

<input id="modalInput" placeholder="新任务">
<button onclick="addModalTask()">添加</button>

<button onclick="closeModal()">关闭</button>

</div>
</div>



<script>

let currentColor="#ff6b6b"

let todos=JSON.parse(localStorage.getItem("todos")||"[]")
let calendarTasks=JSON.parse(localStorage.getItem("calendarTasks")||"{}")

let selectedDate=null

function save(){
localStorage.setItem("todos",JSON.stringify(todos))
localStorage.setItem("calendarTasks",JSON.stringify(calendarTasks))
}

function selectColor(color,el){

currentColor=color

document.querySelectorAll(".color").forEach(c=>c.classList.remove("active"))

el.classList.add("active")

}

function addTodo(){

let text=document.getElementById("todoInput").value

if(!text)return

todos.push({text,color:currentColor})

document.getElementById("todoInput").value=""

save()

renderTodos()

}

function renderTodos(){

let box=document.getElementById("todoList")

box.innerHTML=""

todos.forEach((t,i)=>{

let div=document.createElement("div")

div.className="todo-item"

div.style.background=t.color

div.textContent=t.text

div.oncontextmenu=e=>{

e.preventDefault()

if(confirm("移动到日历?")){

chooseDate(i)

}

}

box.appendChild(div)

})

}

function chooseDate(index){

let date=prompt("输入日期 YYYY-MM-DD")

if(!date)return

if(!calendarTasks[date])calendarTasks[date]=[]

calendarTasks[date].push(todos[index])

todos.splice(index,1)

save()

render()

}

function render(){

renderTodos()

renderCalendar()

}

function renderCalendar(){

let cal=document.getElementById("calendar")

cal.innerHTML=""

let now=new Date()

let year=now.getFullYear()

let month=now.getMonth()

document.getElementById("month").innerText=year+"-"+(month+1)

let first=new Date(year,month,1).getDay()

let days=new Date(year,month+1,0).getDate()

for(let i=0;i<first;i++){

cal.appendChild(document.createElement("div"))

}

for(let d=1;d<=days;d++){

let dateStr=year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0")

let day=document.createElement("div")

day.className="day"

let date=document.createElement("div")

date.className="date"

date.textContent=d

date.onclick=()=>openModal(dateStr)

let tasksDiv=document.createElement("div")

tasksDiv.className="tasks"

tasksDiv.onclick=()=>addCalendarTask(dateStr)

if(calendarTasks[dateStr]){

calendarTasks[dateStr].forEach((t,i)=>{

let task=document.createElement("div")

task.className="task"

task.style.background=t.color

task.innerHTML=`${t.text} <span><button onclick="editTask('${dateStr}',${i})">✏️</button><button onclick="deleteTask('${dateStr}',${i})">❌</button></span>`

tasksDiv.appendChild(task)

})

}

day.appendChild(date)

day.appendChild(tasksDiv)

cal.appendChild(day)

}

}

function addCalendarTask(date){

let text=prompt("任务内容")

if(!text)return

if(!calendarTasks[date])calendarTasks[date]=[]

calendarTasks[date].push({text,color:currentColor})

save()

render()

}

function deleteTask(date,i){

calendarTasks[date].splice(i,1)

save()

render()

}

function editTask(date,i){

let text=prompt("修改任务",calendarTasks[date][i].text)

if(!text)return

calendarTasks[date][i].text=text

save()

render()

}

function openModal(date){

selectedDate=date

document.getElementById("dayModal").style.display="flex"

document.getElementById("modalDate").innerText=date

renderModal()

}

function renderModal(){

let box=document.getElementById("modalTasks")

box.innerHTML=""

let tasks=calendarTasks[selectedDate]||[]

tasks.forEach(t=>{

let div=document.createElement("div")

div.className="task"

div.style.background=t.color

div.textContent=t.text

box.appendChild(div)

})

}

function addModalTask(){

let text=document.getElementById("modalInput").value

if(!text)return

if(!calendarTasks[selectedDate])calendarTasks[selectedDate]=[]

calendarTasks[selectedDate].push({text,color:currentColor})

document.getElementById("modalInput").value=""

save()

render()

renderModal()

}

function closeModal(){

document.getElementById("dayModal").style.display="none"

}

render()

</script>

</body>
</html>
