<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日历待办</title>

<style>

*{
box-sizing:border-box;
}

html, body{
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
margin:0;
padding:0;
background:#f2f2f7;
min-height:100vh;
width:100%;
overflow-x:hidden;
}

body{
padding:12px;
padding-bottom:40px;
}

/* 顶部月份导航 */
.header{
display:flex;
align-items:center;
justify-content:center;
margin-bottom:12px;
position:relative;
}

.month-nav{
display:flex;
align-items:center;
gap:24px;
}

.nav-btn{
background:none;
border:none;
font-size:32px;
color:#007aff;
cursor:pointer;
padding:8px 16px;
border-radius:20px;
transition:background 0.2s;
}

.nav-btn:active{
background:rgba(0,122,255,0.15);
}

.today-btn{
position:absolute;
right:0;
background:#f2f2f7;
border:none;
font-size:12px;
color:#007aff;
padding:6px 12px;
border-radius:12px;
font-weight:500;
}

.today-btn:active{
background:#e5e5ea;
}

.current-month{
font-size:20px;
font-weight:600;
color:#000;
}

/* 星期头部 */
.weekday-header{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:1px;
margin-bottom:4px;
}

.weekday{
text-align:center;
font-size:10px;
color:#8e8e93;
font-weight:600;
padding:8px 0;
}

/* 日历 */
.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:1px;
background:#e5e5ea;
border-radius:12px;
overflow:hidden;
}

.calendar-day{
background:#fff;
min-height:calc((100vw - 48px) / 7);
padding:2px;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
cursor:pointer;
}

.calendar-day.other-month{
background:#fafafa;
}

.calendar-day.other-month .day-number{
color:#c7c7cc;
}

.calendar-day.today .day-number{
background:#007aff;
color:white;
border-radius:50%;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
}

.calendar-day.has-tasks::after{
content:'';
position:absolute;
bottom:4px;
width:4px;
height:4px;
background:#007aff;
border-radius:50%;
}

.day-number{
font-size:13px;
color:#000;
font-weight:500;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

/* 任务容器 */
.tasks-container{
flex:1;
width:100%;
display:flex;
flex-direction:column;
gap:1px;
overflow:hidden;
max-height:45px;
}

/* 日历任务 - 更紧凑 */
.calendar-task{
color:white;
padding:1px 4px;
border-radius:3px;
font-size:9px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
font-weight:500;
line-height:1.2;
}

/* 分类颜色 - iPhone日历风格 */
.category-0{background:rgba(255,59,48,0.2);color:#ff3b30;}
.category-1{background:rgba(255,149,0,0.2);color:#ff9500;}
.category-2{background:rgba(255,204,0,0.2);color:#b39800;}
.category-3{background:rgba(52,199,89,0.2);color:#34c759;}
.category-4{background:rgba(0,122,255,0.2);color:#007aff;}
.category-5{background:rgba(102,109,213,0.2);color:#666dd5;}
.category-6{background:rgba(242,126,225,0.2);color:#f27ee1;}

/* 待办区域 */
.todo-section{
margin-top:16px;
}

.todo-header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:8px;
}

.section-title{
font-size:13px;
color:#8e8e93;
font-weight:600;
letter-spacing:0.5px;
}

.clear-btn{
font-size:12px;
color:#ff3b30;
background:none;
border:none;
padding:4px 8px;
}

/* 添加任务输入框 */
.input-area{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 1px 2px rgba(0,0,0,0.05);
}

.task-input-row{
display:flex;
gap:8px;
align-items:center;
}

#taskInput{
flex:1;
border:none;
outline:none;
font-size:14px;
padding:8px 10px;
background:#f2f2f7;
border-radius:8px;
min-width:0;
}

#addBtn{
background:#007aff;
color:white;
border:none;
padding:8px 16px;
border-radius:8px;
font-size:14px;
font-weight:600;
cursor:pointer;
flex-shrink:0;
}

#addBtn:active{
opacity:0.7;
}

/* 分类选择器 */
.category-picker{
display:flex;
gap:4px;
flex-shrink:0;
}

.category-option{
width:22px;
height:22px;
border-radius:50%;
cursor:pointer;
border:2px solid transparent;
transition:transform 0.15s;
}

.category-option.selected{
border-color:#333;
transform:scale(1.15);
}

/* 待办任务列表 */
#unscheduled{
background:white;
border-radius:12px;
padding:10px;
min-height:50px;
box-shadow:0 1px 2px rgba(0,0,0,0.05);
display:flex;
flex-wrap:wrap;
gap:6px;
align-items:flex-start;
}

.todo-task{
display:inline-block;
color:white;
padding:4px 10px;
border-radius:6px;
font-size:12px;
white-space:nowrap;
font-weight:500;
user-select:none;
-webkit-user-select:none;
touch-action:none;
}

.todo-task:active{
opacity:0.7;
}

.empty-tip{
color:#c7c7cc;
font-size:13px;
width:100%;
text-align:center;
padding:8px;
}

/* 备忘录 */
.memo-section{
background:white;
border-radius:12px;
padding:12px;
margin-top:12px;
box-shadow:0 1px 2px rgba(0,0,0,0.05);
}

.memo-header{
font-size:13px;
color:#8e8e93;
font-weight:600;
letter-spacing:0.5px;
margin-bottom:8px;
}

.memo-textarea{
width:100%;
border:none;
outline:none;
font-size:13px;
padding:8px;
background:#f2f2f7;
border-radius:8px;
resize:none;
font-family:inherit;
line-height:1.5;
min-height:60px;
}

.memo-textarea::placeholder{
color:#c7c7cc;
}

/* 弹窗 */
.popup-mask{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
padding:24px;
}

.popup-mask.hidden{
display:none;
}

.popup-content{
background:white;
border-radius:16px;
padding:20px;
width:100%;
max-width:340px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

.popup-title{
font-size:16px;
font-weight:600;
margin-bottom:12px;
text-align:center;
color:#000;
}

.popup-subtitle{
font-size:12px;
color:#8e8e93;
text-align:center;
margin-top:4px;
margin-bottom:12px;
}

.popup-input{
width:100%;
border:none;
outline:none;
font-size:15px;
padding:12px;
background:#f2f2f7;
border-radius:10px;
margin-bottom:12px;
}

.popup-category-picker{
display:flex;
gap:8px;
justify-content:center;
margin-bottom:14px;
}

.popup-category-option{
width:28px;
height:28px;
border-radius:50%;
cursor:pointer;
border:2px solid transparent;
}

.popup-category-option.selected{
border-color:#333;
transform:scale(1.1);
}

.popup-buttons{
display:flex;
gap:10px;
}

.popup-btn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:14px;
font-weight:600;
cursor:pointer;
text-align:center;
}

.popup-btn-cancel{
background:#f2f2f7;
color:#333;
}

.popup-btn-confirm{
background:#007aff;
color:white;
}

/* 详情弹窗任务项 */
.detail-task-item{
display:flex;
align-items:center;
padding:8px;
background:#f9f9f9;
border-radius:8px;
margin-bottom:6px;
}

.detail-task-item .task-text{
flex:1;
font-size:14px;
color:#000;
}

.detail-delete-btn{
background:none;
border:none;
color:#ff3b30;
font-size:18px;
padding:4px 8px;
cursor:pointer;
opacity:0.6;
}

.detail-delete-btn:active{
opacity:1;
}

.no-tasks{
text-align:center;
color:#c7c7cc;
padding:20px;
font-size:14px;
}

/* 更多任务提示 */
.more-tasks-hint{
font-size:9px;
color:#8e8e93;
text-align:center;
padding:2px;
}

</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="header">
<div class="month-nav">
<button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
<span class="current-month" id="currentMonth"></span>
<button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
</div>
<button class="today-btn" onclick="goToToday">今天</button>
</div>

<!-- 星期头部 -->
<div class="weekday-header">
<div class="weekday">一</div>
<div class="weekday">二</div>
<div class="weekday">三</div>
<div class="weekday">四</div>
<div class="weekday">五</div>
<div class="weekday">六</div>
<div class="weekday">日</div>
</div>

<!-- 日历网格 -->
<div class="calendar-grid" id="calendar"></div>

<!-- 待办区域 -->
<div class="todo-section">
<div class="todo-header">
<span class="section-title">待办事项</span>
<button class="clear-btn" onclick="clearAllTodos">清空</button>
</div>

<div class="input-area">
<div class="task-input-row">
<input id="taskInput" placeholder="添加待办...">
<div class="category-picker" id="categoryPicker"></div>
<button id="addBtn" onclick="addTask()">+</button>
</div>
</div>

<div id="unscheduled"></div>
</div>

<!-- 备忘录 -->
<div class="memo-section">
<div class="memo-header">备忘录</div>
<textarea class="memo-textarea" id="memoInput" placeholder="记录想法、灵感..."></textarea>
</div>

<!-- 弹窗 -->
<div class="popup-mask hidden" id="datePopup">
<div class="popup-content">
<div class="popup-title" id="popupTitle"></div>
<input class="popup-input" id="popupInput" placeholder="输入任务...">
<div class="popup-category-picker" id="popupCategoryPicker"></div>
<div class="popup-buttons">
<button class="popup-btn popup-btn-cancel" onclick="closePopup()">取消</button>
<button class="popup-btn popup-btn-confirm" onclick="confirmAddTask()">添加</button>
</div>
</div>
</div>


<script>

const categoryColors = ['#ff3b30','#ff9500','#ffcc00','#34c759','#007aff','#666dd5','#f27ee1'];

let selectedCategory = 0;
let popupSelectedCategory = 0;
let tasks = [];
let currentYear, currentMonth;
let popupDate = null;
const weekStart = 1;
const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

let draggedTask = null;

// 移动端拖拽
let touchElement = null;
let longPressTimer = null;

function initCategoryPicker(){
let picker = document.getElementById('categoryPicker');
categoryColors.forEach((color, index) => {
let dot = document.createElement('div');
dot.className = 'category-option' + (index === 0 ? ' selected' : '');
dot.style.background = color;
dot.onclick = function(){ selectCategory(index); };
picker.appendChild(dot);
});
}

function selectCategory(index){
selectedCategory = index;
document.querySelectorAll('.category-option').forEach(function(el, i){
el.classList.toggle('selected', i === index);
});
}

function initPopupCategoryPicker(){
let picker = document.getElementById('popupCategoryPicker');
picker.innerHTML = '';
categoryColors.forEach(function(color, index){
let dot = document.createElement('div');
dot.className = 'popup-category-option' + (index === popupSelectedCategory ? ' selected' : '');
dot.style.background = color;
dot.onclick = function(){ selectPopupCategory(index); };
picker.appendChild(dot);
});
}

function selectPopupCategory(index){
popupSelectedCategory = index;
document.querySelectorAll('.popup-category-option').forEach(function(el, i){
el.classList.toggle('selected', i === index);
});
}

// 移动端长按拖拽
document.addEventListener('touchstart', function(e){
touchElement = e.target.closest('.todo-task');
if(touchElement){
longPressTimer = setTimeout(function(){
if(touchElement){
draggedTask = touchElement;
touchElement.style.opacity = '0.6';
touchElement.style.transform = 'scale(1.05)';
}
}, 400);
}
}, false);

document.addEventListener('touchmove', function(e){
if(longPressTimer){
clearTimeout(longPressTimer);
longPressTimer = null;
}
if(draggedTask && touchElement){
e.preventDefault();
let touch = e.touches[0];
touchElement.style.position = 'fixed';
touchElement.style.left = (touch.clientX - 30) + 'px';
touchElement.style.top = (touch.clientY - 12) + 'px';
touchElement.style.zIndex = '1000';
touchElement.style.pointerEvents = 'none';
}
}, false);

document.addEventListener('touchend', function(e){
if(longPressTimer){
clearTimeout(longPressTimer);
longPressTimer = null;
}
if(draggedTask && touchElement){
touchElement.style.opacity = '1';
touchElement.style.transform = 'none';
touchElement.style.position = 'static';
touchElement.style.zIndex = '';
touchElement.style.pointerEvents = '';

let touch = e.changedTouches[0];
let target = document.elementFromPoint(touch.clientX, touch.clientY);

// 检查是否放到日历格子上
let dayEl = target ? target.closest('.calendar-day') : null;
if(dayEl && dayEl.dataset.date){
let taskId = parseInt(draggedTask.dataset.id);
let task = tasks.find(function(t){ return t.id == taskId; });
if(task){
task.date = dayEl.dataset.date;
saveTasks();
}
}

draggedTask = null;
touchElement = null;
}
});

// 添加待办任务
function addTask(){
let text = document.getElementById('taskInput').value.trim();
if(!text) return;

let task = {
id: Date.now(),
text: text,
category: selectedCategory,
date: null
};

tasks.push(task);
saveTasks();
document.getElementById('taskInput').value = '';
}

function createTaskElement(task, isCalendar){
let el = document.createElement('div');
el.className = isCalendar ? 'calendar-task category-' + task.category : 'todo-task category-' + task.category;
el.innerText = task.text;
el.dataset.id = task.id;
if(!isCalendar){
el.ondragstart = function(e){
draggedTask = e.target;
e.dataTransfer.effectAllowed = 'move';
};
}
return el;
}

// 切换月份
function changeMonth(delta){
currentMonth += delta;
if(currentMonth > 11){ currentMonth = 0; currentYear++; }
else if(currentMonth < 0){ currentMonth = 11; currentYear--; }
renderCalendar();
}

// 返回今天
function goToToday(){
let now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();
renderCalendar();
}

// 渲染日历
function renderCalendar(){
document.getElementById('currentMonth').innerText = currentYear + '年 ' + monthNames[currentMonth];

let calendar = document.getElementById('calendar');
calendar.innerHTML = '';

let firstDay = new Date(currentYear, currentMonth, 1);
let firstDayOfWeek = firstDay.getDay();
let startOffset = (firstDayOfWeek - weekStart + 7) % 7;

let prevMonthLastDay = new Date(currentYear, currentMonth, 0).getDate();
let daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

let totalCells = startOffset + daysInMonth;
let weeksCount = Math.ceil(totalCells / 7);

let today = new Date();
let todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

for(let week = 0; week < weeksCount; week++){
for(let day = 0; day < 7; day++){
let cellIndex = week * 7 + day;
let dayNum = cellIndex - startOffset + 1;

let isOtherMonth = false;
let displayNum = dayNum;

if(dayNum < 1){
displayNum = prevMonthLastDay + dayNum;
isOtherMonth = true;
}else if(dayNum > daysInMonth){
displayNum = dayNum - daysInMonth;
isOtherMonth = true;
}

let dateStr = '';
let year = currentYear;
let month = currentMonth;
if(dayNum < 1){
month = currentMonth - 1;
if(month < 0){ month = 11; year--; }
dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(displayNum).padStart(2,'0');
}else if(dayNum > daysInMonth){
month = currentMonth + 1;
if(month > 11){ month = 0; year++; }
dateStr = year + '-' + String(month+1).padStart(2,'0') + '-' + String(displayNum).padStart(2,'0');
}else{
dateStr = currentYear + '-' + String(currentMonth+1).padStart(2,'0') + '-' + String(dayNum).padStart(2,'0');
}

let isToday = (dateStr === todayStr);
let dayTasks = tasks.filter(function(t){ return t.date === dateStr; });

let dayEl = document.createElement('div');
dayEl.className = 'calendar-day' + (isOtherMonth ? ' other-month' : '') + (isToday ? ' today' : '') + (dayTasks.length > 0 ? ' has-tasks' : '');
dayEl.dataset.date = dateStr;

// 点击数字查看详情
let numberArea = document.createElement('div');
numberArea.style.cssText = 'width:100%;display:flex;flex-direction:column;align-items:center;flex:1;';
numberArea.onclick = function(e){
e.stopPropagation();
showDayDetail(dateStr);
};

let number = document.createElement('div');
number.className = 'day-number';
number.innerText = displayNum;
numberArea.appendChild(number);

// 任务区域 - 点击添加
let tasksContainer = document.createElement('div');
tasksContainer.className = 'tasks-container';
tasksContainer.onclick = function(e){
e.stopPropagation();
showDatePopup(dateStr);
};

// 显示前2个任务
dayTasks.slice(0, 2).forEach(function(task){
let taskEl = createTaskElement(task, true);
tasksContainer.appendChild(taskEl);
});

// 更多任务提示
if(dayTasks.length > 2){
let hint = document.createElement('div');
hint.className = 'more-tasks-hint';
hint.innerText = '+' + (dayTasks.length - 2);
tasksContainer.appendChild(hint);
}

numberArea.appendChild(tasksContainer);
dayEl.appendChild(numberArea);
calendar.appendChild(dayEl);
}
}
}

// 显示日期详情
function showDayDetail(dateStr){
let dayTasks = tasks.filter(function(t){ return t.date === dateStr; });
let date = new Date(dateStr);
let title = date.getFullYear() + '年' + monthNames[date.getMonth()] + '月' + date.getDate() + '日';

document.getElementById('popupTitle').innerHTML = title + '<div class="popup-subtitle">点击空白处添加新任务</div>';
document.getElementById('popupInput').style.display = 'block';
document.getElementById('popupInput').value = '';
document.getElementById('popupInput').focus();
document.getElementById('popupCategoryPicker').style.display = 'flex';

// 显示任务列表
let buttonsHtml = '<button class="popup-btn popup-btn-cancel" onclick="closePopup()">关闭</button><button class="popup-btn popup-btn-confirm" onclick="confirmAddTask()">添加</button>';
document.querySelector('.popup-buttons').innerHTML = buttonsHtml;

popupDate = dateStr;
popupSelectedCategory = selectedCategory;
initPopupCategoryPicker();
document.getElementById('datePopup').classList.remove('hidden');
}

// 点击日期添加任务
function showDatePopup(dateStr){
popupDate = dateStr;
popupSelectedCategory = selectedCategory;
let date = new Date(dateStr);
document.getElementById('popupTitle').innerHTML = date.getFullYear() + '年' + monthNames[date.getMonth()] + '月' + date.getDate() + '日';
document.getElementById('popupInput').style.display = 'block';
document.getElementById('popupInput').value = '';
document.getElementById('popupInput').focus();
document.getElementById('popupCategoryPicker').style.display = 'flex';
document.querySelector('.popup-buttons').innerHTML = '<button class="popup-btn popup-btn-cancel" onclick="closePopup()">取消</button><button class="popup-btn popup-btn-confirm" onclick="confirmAddTask()">添加</button>';
initPopupCategoryPicker();
document.getElementById('datePopup').classList.remove('hidden');
}

function closePopup(){
document.getElementById('datePopup').classList.add('hidden');
popupDate = null;
}

function confirmAddTask(){
let text = document.getElementById('popupInput').value.trim();
if(!text || !popupDate) return;

let task = {
id: Date.now(),
text: text,
category: popupSelectedCategory,
date: popupDate
};

tasks.push(task);
saveTasks();
closePopup();
renderCalendar();
}

// 删除任务
function deleteTask(taskId){
tasks = tasks.filter(function(t){ return t.id !== taskId; });
saveTasks();
renderCalendar();

// 如果详情弹窗还开着，刷新它
if(popupDate && !document.getElementById('datePopup').classList.contains('hidden')){
showDayDetail(popupDate);
}
}

// 清空待办
function clearAllTodos(){
if(confirm('确定清空所有待办吗？')){
tasks = tasks.filter(function(t){ return t.date !== null; });
saveTasks();
}
}

// 数据存储
function saveTasks(){
localStorage.setItem('calendarTasks', JSON.stringify(tasks));
updateUnscheduled();
}

function loadTasks(){
let saved = localStorage.getItem('calendarTasks');
if(saved){
tasks = JSON.parse(saved);
}
renderCalendar();
updateUnscheduled();
}

function updateUnscheduled(){
let el = document.getElementById('unscheduled');
el.innerHTML = '';
let unscheduledTasks = tasks.filter(function(t){ return !t.date; });
if(unscheduledTasks.length === 0){
el.innerHTML = '<div class="empty-tip">暂无待办</div>';
}else{
unscheduledTasks.forEach(function(task){
let taskEl = createTaskElement(task, false);
el.appendChild(taskEl);
});
}
}

// 备忘录
function saveMemo(){
localStorage.setItem('calendarMemo', document.getElementById('memoInput').value);
}

function loadMemo(){
let memo = localStorage.getItem('calendarMemo');
if(memo){
document.getElementById('memoInput').value = memo;
}
}

// 初始化
let now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();

initCategoryPicker();
loadTasks();
loadMemo();

// 备忘录自动保存
document.getElementById('memoInput').addEventListener('input', saveMemo);

// 回车添加
document.getElementById('popupInput').onkeydown = function(e){
if(e.key === 'Enter') confirmAddTask();
if(e.key === 'Escape') closePopup();
};

</script>
</body>
</html>
