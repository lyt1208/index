<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calendar Todo</title>

<style>

body{
font-family:Arial;
margin:20px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.day{
border:1px solid #ccc;
min-height:110px;
padding:5px;
}

.date{
font-size:12px;
color:gray;
}

.task{
padding:6px 10px;
cursor:grab;
font-size:12px;
border-radius:20px;
color:white;
white-space:nowrap;
max-width:120px;
overflow:hidden;
text-overflow:ellipsis;
touch-action:none;
}

.done{
text-decoration:line-through;
opacity:0.6;
}

#inbox{
margin-top:20px;
border:2px dashed #aaa;
padding:10px;
min-height:60px;

display:flex;
flex-wrap:wrap;
gap:6px;
}

.task span{
margin-left:6px;
cursor:pointer;
}

@media (max-width:600px){

body{
margin:10px;
}

.day{
min-height:80px;
font-size:11px;
}

.task{
font-size:11px;
max-width:90px;
}

}

</style>

</head>

<body>

<h2 id="month"></h2>

<button onclick="prevMonth()">←</button>
<button onclick="nextMonth()">→</button>

<div id="calendar"></div>

<h3>待办任务</h3>

<input id="taskInput" placeholder="任务">

<select id="colorInput">

<option value="#4CAF50">🟢</option>
<option value="#2196F3">🔵</option>
<option value="#FF9800">🟠</option>
<option value="#9C27B0">🟣</option>
<option value="#F44336">🔴</option>

</select>

<button onclick="addTask()">添加</button>

<div id="inbox"></div>

<script>

let current=new Date()
let draggedTask=null

function renderCalendar(){

let calendar=document.getElementById("calendar")
calendar.innerHTML=""
document.getElementById("inbox").innerHTML=""

let y=current.getFullYear()
let m=current.getMonth()

document.getElementById("month").innerText=y+"-"+(m+1)

let firstDay=new Date(y,m,1).getDay()
let days=new Date(y,m+1,0).getDate()

for(let i=0;i<firstDay;i++){

calendar.innerHTML+="<div></div>"

}

for(let d=1;d<=days;d++){

let key=`${y}-${m+1}-${d}`

let div=document.createElement("div")
div.className="day"
div.dataset.date=key

div.ondragover=e=>e.preventDefault()

div.ondrop=e=>{
moveTask(key)
}

div.innerHTML=`<div class="date">${d}</div>`

calendar.appendChild(div)

}

loadTasks()

}

function addTask(){

let text=document.getElementById("taskInput").value
let color=document.getElementById("colorInput").value

if(!text) return

let id="task"+Date.now()

let data=getData()

data[id]={text,color,done:false,loc:"inbox"}

saveData(data)

document.getElementById("taskInput").value=""

renderCalendar()

}

function createTask(id,obj){

let div=document.createElement("div")

div.className="task"

if(obj.done) div.classList.add("done")

div.style.background=obj.color

div.draggable=true

div.id=id

div.ondragstart=()=>{
draggedTask=id
}

div.ontouchstart=()=>{
draggedTask=id
}

div.innerHTML=`

<input type="checkbox"
${obj.done?"checked":""}
onchange="toggleDone('${id}')">

${obj.text}

<span onclick="editTask('${id}')">✏️</span>
<span onclick="deleteTask('${id}')">🗑</span>

`

return div

}

function moveTask(loc){

let data=getData()

data[draggedTask].loc=loc

saveData(data)

renderCalendar()

}

function toggleDone(id){

let data=getData()

data[id].done=!data[id].done

saveData(data)

renderCalendar()

}

function editTask(id){

let data=getData()

let text=prompt("修改任务",data[id].text)

if(text){

data[id].text=text

}

saveData(data)

renderCalendar()

}

function deleteTask(id){

let data=getData()

delete data[id]

saveData(data)

renderCalendar()

}

function loadTasks(){

let data=getData()

let inbox=document.getElementById("inbox")

inbox.ondragover=e=>e.preventDefault()

inbox.ondrop=()=>{

moveTask("inbox")

}

for(let id in data){

let task=createTask(id,data[id])

if(data[id].loc=="inbox"){

inbox.appendChild(task)

}else{

let day=document.querySelector(`[data-date="${data[id].loc}"]`)

if(day) day.appendChild(task)

}

}

}

function getData(){

return JSON.parse(localStorage.getItem("tasks")||"{}")

}

function saveData(data){

localStorage.setItem("tasks",JSON.stringify(data))

}

function prevMonth(){

current.setMonth(current.getMonth()-1)

renderCalendar()

}

function nextMonth(){

current.setMonth(current.getMonth()+1)

renderCalendar()

}

renderCalendar()

</script>

</body>
</html>
