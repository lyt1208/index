<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calendar Todo</title>

<style>

body{
font-family:Arial;
margin:20px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.day{
border:1px solid #ccc;
min-height:110px;
padding:5px;
}

.date{
font-size:12px;
color:gray;
cursor:pointer;
}

.task{
padding:6px 10px;
cursor:grab;
font-size:12px;
border-radius:20px;
color:white;
white-space:nowrap;
max-width:120px;
overflow:hidden;
text-overflow:ellipsis;

user-select:none;
-webkit-user-select:none;
}

#inbox{
margin-top:20px;
border:2px dashed #aaa;
padding:10px;

display:flex;
flex-wrap:wrap;
gap:6px;
}

.popup{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:white;
border:1px solid #ccc;
padding:20px;

box-shadow:0 0 10px rgba(0,0,0,0.2);

}

@media (max-width:600px){

.day{
min-height:80px;
}

}

</style>

</head>

<body>

<h2 id="month"></h2>

<button onclick="prevMonth()">←</button>
<button onclick="nextMonth()">→</button>

<div id="calendar"></div>

<h3>待办任务</h3>

<input id="taskInput">

<select id="colorInput">

<option value="#4CAF50">🟢</option>
<option value="#2196F3">🔵</option>
<option value="#FF9800">🟠</option>
<option value="#9C27B0">🟣</option>
<option value="#F44336">🔴</option>

</select>

<button onclick="addTask()">添加</button>

<div id="inbox"></div>

<script>

let current=new Date()
let dragged=null

function renderCalendar(){

let calendar=document.getElementById("calendar")

calendar.innerHTML=""

let y=current.getFullYear()
let m=current.getMonth()

document.getElementById("month").innerText=y+"-"+(m+1)

let firstDay=new Date(y,m,1).getDay()
let days=new Date(y,m+1,0).getDate()

for(let i=0;i<firstDay;i++) calendar.innerHTML+="<div></div>"

for(let d=1;d<=days;d++){

let key=`${y}-${m+1}-${d}`

let div=document.createElement("div")
div.className="day"
div.dataset.date=key

div.onclick=(e)=>{

if(e.target.classList.contains("date")) return

let text=prompt("新增任务")

if(!text) return

let data=getData()

let id="task"+Date.now()

data[id]={text,color:"#4CAF50",loc:key}

saveData(data)

renderCalendar()

}

let date=document.createElement("div")

date.className="date"
date.innerText=d

date.onclick=(e)=>{

e.stopPropagation()

showDayTasks(key)

}

div.appendChild(date)

calendar.appendChild(div)

}

loadTasks()

}

function createTask(id,obj){

let div=document.createElement("div")

div.className="task"

div.style.background=obj.color

div.innerText=obj.text

div.draggable=true

div.ondragstart=()=>dragged=id

div.ontouchstart=()=>dragged=id

return div

}

function loadTasks(){

let data=getData()

let inbox=document.getElementById("inbox")

inbox.innerHTML=""

inbox.onclick=()=>moveTask("inbox")

for(let id in data){

let task=createTask(id,data[id])

task.onclick=()=>dragged=id

if(data[id].loc=="inbox"){

inbox.appendChild(task)

}else{

let day=document.querySelector(`[data-date="${data[id].loc}"]`)

if(day) day.appendChild(task)

}

}

}

function moveTask(loc){

let data=getData()

if(!dragged) return

data[dragged].loc=loc

saveData(data)

renderCalendar()

}

function showDayTasks(date){

let data=getData()

let popup=document.createElement("div")

popup.className="popup"

let html=`<h3>${date}</h3>`

for(let id in data){

if(data[id].loc==date){

html+=`<div>${data[id].text}</div>`

}

}

html+=`<br><button onclick="this.parentNode.remove()">关闭</button>`

popup.innerHTML=html

document.body.appendChild(popup)

}

function addTask(){

let text=document.getElementById("taskInput").value
let color=document.getElementById("colorInput").value

if(!text) return

let id="task"+Date.now()

let data=getData()

data[id]={text,color,loc:"inbox"}

saveData(data)

renderCalendar()

}

function getData(){

return JSON.parse(localStorage.getItem("tasks")||"{}")

}

function saveData(data){

localStorage.setItem("tasks",JSON.stringify(data))

}

function prevMonth(){

current.setMonth(current.getMonth()-1)

renderCalendar()

}

function nextMonth(){

current.setMonth(current.getMonth()+1)

renderCalendar()

}

renderCalendar()

</script>

</body>
</html>
