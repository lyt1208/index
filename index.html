<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calendar Todo</title>

<style>

body{
font-family:Arial;
margin:20px;
}

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
border:1px solid #ccc;
min-height:100px;
padding:5px;
}

.date{
font-size:12px;
color:gray;
cursor:pointer;
}

.task{
display:inline-flex;
align-items:center;
gap:4px;

padding:2px 6px;
border-radius:6px;

font-size:12px;
cursor:grab;

user-select:none;
-webkit-user-select:none;
}

.task span{
cursor:pointer;
font-size:12px;
}

#inbox{

margin-top:20px;
border:2px dashed #aaa;
padding:10px;

display:flex;
flex-wrap:wrap;
gap:6px;

}

.popup{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);

background:white;
padding:20px;
border:1px solid #ccc;

box-shadow:0 0 10px rgba(0,0,0,0.2);

}

@media (max-width:600px){

body{
margin:10px;
}

.day{
min-height:80px;
}

.task{
font-size:11px;
}

}

</style>

</head>

<body>

<h2 id="month"></h2>

<button onclick="prevMonth()">←</button>
<button onclick="nextMonth()">→</button>

<div id="calendar"></div>

<h3>待办任务</h3>

<input id="taskInput">

<select id="colorInput">

<option value="#4CAF50">🟢</option>
<option value="#2196F3">🔵</option>
<option value="#FF9800">🟠</option>
<option value="#9C27B0">🟣</option>
<option value="#F44336">🔴</option>

</select>

<button onclick="addTask()">添加</button>

<div id="inbox"></div>

<script>

let current=new Date()

function renderCalendar(){

let calendar=document.getElementById("calendar")
calendar.innerHTML=""

let y=current.getFullYear()
let m=current.getMonth()

document.getElementById("month").innerText=y+"-"+(m+1)

let firstDay=new Date(y,m,1).getDay()
let days=new Date(y,m+1,0).getDate()

for(let i=0;i<firstDay;i++) calendar.innerHTML+="<div></div>"

for(let d=1;d<=days;d++){

let key=`${y}-${m+1}-${d}`

let div=document.createElement("div")
div.className="day"
div.dataset.date=key

div.onclick=(e)=>{

if(e.target.classList.contains("date")) return

let text=prompt("任务内容")
if(!text) return

let color=prompt("颜色(hex)", "#4CAF50")

let data=getData()

let id="task"+Date.now()

data[id]={text,color,loc:key}

saveData(data)

renderCalendar()

}

let date=document.createElement("div")
date.className="date"
date.innerText=d

date.onclick=(e)=>{

e.stopPropagation()

showDayTasks(key)

}

div.appendChild(date)

calendar.appendChild(div)

}

loadTasks()

}

function createTask(id,obj){

let div=document.createElement("div")

div.className="task"
div.style.background=obj.color

div.draggable=true

div.ondragstart=(e)=>{
e.dataTransfer.setData("id",id)
}

let timer

div.ontouchstart=()=>{

timer=setTimeout(()=>{

chooseDate(id)

},600)

}

div.ontouchend=()=>clearTimeout(timer)

div.innerHTML=`

${obj.text}

<span onclick="editTask('${id}')">✏️</span>
<span onclick="deleteTask('${id}')">🗑</span>

`

return div

}

function chooseDate(id){

let date=prompt("输入日期 YYYY-M-D 或 inbox")

if(!date) return

let data=getData()

data[id].loc=date

saveData(data)

renderCalendar()

}

function loadTasks(){

let data=getData()

let inbox=document.getElementById("inbox")
inbox.innerHTML=""

inbox.ondragover=e=>e.preventDefault()

inbox.ondrop=e=>{

let id=e.dataTransfer.getData("id")

data[id].loc="inbox"

saveData(data)

renderCalendar()

}

for(let id in data){

let task=createTask(id,data[id])

if(data[id].loc=="inbox"){

inbox.appendChild(task)

}else{

let day=document.querySelector(`[data-date="${data[id].loc}"]`)

if(day){

day.ondragover=e=>e.preventDefault()

day.ondrop=e=>{

let id=e.dataTransfer.getData("id")

data[id].loc=day.dataset.date

saveData(data)

renderCalendar()

}

day.appendChild(task)

}

}

}

}

function showDayTasks(date){

let data=getData()

let popup=document.createElement("div")
popup.className="popup"

let html=`<h3>${date}</h3>`

for(let id in data){

if(data[id].loc==date){

html+=`<div>${data[id].text}</div>`

}

}

html+=`<br><button onclick="this.parentNode.remove()">关闭</button>`

popup.innerHTML=html

document.body.appendChild(popup)

}

function editTask(id){

let data=getData()

let text=prompt("修改任务",data[id].text)

if(text) data[id].text=text

saveData(data)

renderCalendar()

}

function deleteTask(id){

let data=getData()

delete data[id]

saveData(data)

renderCalendar()

}

function addTask(){

let text=document.getElementById("taskInput").value
let color=document.getElementById("colorInput").value

if(!text) return

let id="task"+Date.now()

let data=getData()

data[id]={text,color,loc:"inbox"}

saveData(data)

renderCalendar()

}

function getData(){

return JSON.parse(localStorage.getItem("tasks")||"{}")

}

function saveData(data){

localStorage.setItem("tasks",JSON.stringify(data))

}

function prevMonth(){

current.setMonth(current.getMonth()-1)
renderCalendar()

}

function nextMonth(){

current.setMonth(current.getMonth()+1)
renderCalendar()

}

renderCalendar()

</script>

</body>
</html>
