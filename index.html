<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calendar Todo V2</title>

<style>

body{
    font-family:Arial;
    margin:20px;
}

#calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
}

.day{
    border:1px solid #ccc;
    min-height:120px;
    padding:5px;
}

.date{
    font-size:12px;
    color:gray;
}

.task{
    padding:3px;
    margin:3px 0;
    cursor:grab;
    font-size:12px;
    border-radius:4px;
    color:white;
}

.done{
    text-decoration:line-through;
    opacity:0.6;
}

#inbox{
    margin-top:20px;
    border:2px dashed #aaa;
    padding:10px;
}

button{
    margin:5px;
}

.task span{
    margin-left:5px;
    cursor:pointer;
}

</style>
</head>

<body>

<h2 id="month"></h2>

<button onclick="prevMonth()">←</button>
<button onclick="nextMonth()">→</button>

<div id="calendar"></div>

<h3>待办任务</h3>

<input id="taskInput" placeholder="任务">
<input type="color" id="colorInput" value="#4CAF50">
<button onclick="addTask()">添加</button>

<div id="inbox" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

<script>

let current=new Date()

function renderCalendar(){

    let calendar=document.getElementById("calendar")
    calendar.innerHTML=""

    let y=current.getFullYear()
    let m=current.getMonth()

    document.getElementById("month").innerText=y+"-"+(m+1)

    let firstDay=new Date(y,m,1).getDay()
    let days=new Date(y,m+1,0).getDate()

    for(let i=0;i<firstDay;i++){
        calendar.innerHTML+="<div></div>"
    }

    for(let d=1;d<=days;d++){

        let key=`${y}-${m+1}-${d}`

        let div=document.createElement("div")
        div.className="day"
        div.dataset.date=key
        div.ondrop=drop
        div.ondragover=allowDrop

        div.innerHTML=`<div class="date">${d}</div>`

        calendar.appendChild(div)
    }

    loadTasks()
}

function addTask(){

    let text=document.getElementById("taskInput").value
    let color=document.getElementById("colorInput").value

    if(!text) return

    let id="task"+Date.now()

    let data=getData()

    data[id]={text,color,done:false,loc:"inbox"}

    saveData(data)

    document.getElementById("taskInput").value=""

    renderCalendar()
}

function createTask(id,obj){

    let div=document.createElement("div")

    div.className="task"
    if(obj.done) div.classList.add("done")

    div.style.background=obj.color
    div.id=id
    div.draggable=true

    div.ondragstart=e=>{
        e.dataTransfer.setData("id",id)
    }

    div.innerHTML=`
    <input type="checkbox" ${obj.done?"checked":""}
    onchange="toggleDone('${id}')">

    ${obj.text}

    <span onclick="editTask('${id}')">✏️</span>
    <span onclick="deleteTask('${id}')">🗑</span>
    `

    return div
}

function allowDrop(e){
    e.preventDefault()
}

function drop(e){

    e.preventDefault()

    let id=e.dataTransfer.getData("id")

    let data=getData()

    let loc=e.target.dataset?.date || "inbox"

    data[id].loc=loc

    saveData(data)

    renderCalendar()
}

function toggleDone(id){

    let data=getData()

    data[id].done=!data[id].done

    saveData(data)

    renderCalendar()
}

function editTask(id){

    let data=getData()

    let text=prompt("修改任务",data[id].text)

    if(text){
        data[id].text=text
    }

    saveData(data)

    renderCalendar()
}

function deleteTask(id){

    let data=getData()

    delete data[id]

    saveData(data)

    renderCalendar()
}

function getData(){
    return JSON.parse(localStorage.getItem("tasks")||"{}")
}

function saveData(data){
    localStorage.setItem("tasks",JSON.stringify(data))
}

function loadTasks(){

    let data=getData()

    for(let id in data){

        let task=createTask(id,data[id])

        if(data[id].loc=="inbox"){

            document.getElementById("inbox").appendChild(task)

        }else{

            let day=document.querySelector(`[data-date="${data[id].loc}"]`)

            if(day) day.appendChild(task)

        }
    }
}

function prevMonth(){
    current.setMonth(current.getMonth()-1)
    renderCalendar()
}

function nextMonth(){
    current.setMonth(current.getMonth()+1)
    renderCalendar()
}

renderCalendar()

</script>

</body>
</html>
